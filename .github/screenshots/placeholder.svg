<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1600" viewBox="0 0 800 1600">
  <rect width="800" height="1600" fill="#18181B" rx="24"/>
  <rect x="20" y="20" width="760" height="1540" rx="16" fill="none" stroke="#27272A" stroke-width="2"/>
  
  <!-- Mock screenshot 1: Dashboard -->
  <g transform="translate(40, 40)">
    <rect x="0" y="0" width="720" height="460" rx="12" fill="#09090B"/>
    <!-- Status bar -->
    <circle cx="20" cy="20" r="4" fill="#2E7D32"/>
    <circle cx="34" cy="20" r="4" fill="#52525B"/>
    <circle cx="48" cy="20" r="4" fill="#52525B"/>
    <!-- Health score -->
    <rect x="20" y="40" width="680" height="80" rx="12" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="40" y="68" font-family="monospace" font-size="11" fill="#71717A">OVERALL CROP HEALTH</text>
    <text x="40" y="105" font-family="sans-serif" font-size="36" font-weight="bold" fill="#4ADE80">78</text>
    <text x="90" y="100" font-family="sans-serif" font-size="16" fill="#4ADE80" font-weight="600">Moderate</text>
    <!-- Metric boxes -->
    <rect x="20" y="140" width="160" height="80" rx="10" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="36" y="165" font-family="sans-serif" font-size="12" fill="#71717A">NDVI</text>
    <text x="36" y="195" font-family="sans-serif" font-size="24" font-weight="bold" fill="#4ADE80">48%</text>
    
    <rect x="190" y="140" width="160" height="80" rx="10" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="206" y="165" font-family="sans-serif" font-size="12" fill="#71717A">EVI</text>
    <text x="206" y="195" font-family="sans-serif" font-size="24" font-weight="bold" fill="#4ADE80">51%</text>
    
    <rect x="360" y="140" width="160" height="80" rx="10" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="376" y="165" font-family="sans-serif" font-size="12" fill="#71717A">NDWI</text>
    <text x="376" y="195" font-family="sans-serif" font-size="24" font-weight="bold" fill="#60A5FA">31%</text>
    
    <rect x="530" y="140" width="170" height="80" rx="10" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="546" y="165" font-family="sans-serif" font-size="12" fill="#71717A">GNDVI</text>
    <text x="546" y="195" font-family="sans-serif" font-size="24" font-weight="bold" fill="#4ADE80">44%</text>
    <!-- Map area -->
    <rect x="20" y="240" width="680" height="200" rx="10" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <rect x="40" y="260" width="640" height="160" rx="8" fill="#1a1a2e" opacity="0.5"/>
    <text x="360" y="325" font-family="sans-serif" font-size="12" fill="#71717A" text-anchor="middle">🗺️ Interactive Field Map</text>
    <text x="360" y="345" font-family="sans-serif" font-size="10" fill="#52525B" text-anchor="middle">Leaflet • OpenStreetMap • Hotspot Grid</text>
  </g>
  
  <!-- Mock screenshot 2: Report -->
  <g transform="translate(40, 530)">
    <rect x="0" y="0" width="720" height="480" rx="12" fill="#09090B"/>
    <text x="360" y="30" font-family="sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">📊 Full Report</text>
    <rect x="20" y="50" width="330" height="100" rx="10" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="36" y="75" font-family="sans-serif" font-size="13" font-weight="bold" fill="#4ADE80">🛰️ Sentinel-2</text>
    <text x="36" y="100" font-family="sans-serif" font-size="11" fill="#A1A1AA">NDVI 48% • EVI 51% • NDWI 31%</text>
    <text x="36" y="118" font-family="sans-serif" font-size="10" fill="#52525B">10m resolution • L2A</text>
    
    <rect x="370" y="50" width="330" height="100" rx="10" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="386" y="75" font-family="sans-serif" font-size="13" font-weight="bold" fill="#60A5FA">🌤️ Weather</text>
    <text x="386" y="100" font-family="sans-serif" font-size="11" fill="#A1A1AA">33.2°C • 64% humidity</text>
    <text x="386" y="118" font-family="sans-serif" font-size="10" fill="#52525B">NASA POWER + Open-Meteo</text>
    
    <rect x="20" y="170" width="330" height="100" rx="10" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="36" y="195" font-family="sans-serif" font-size="13" font-weight="bold" fill="#FBBF24">📡 Sentinel-1 SAR</text>
    <text x="36" y="220" font-family="sans-serif" font-size="11" fill="#A1A1AA">Soil moisture index: 0.34</text>
    <text x="36" y="238" font-family="sans-serif" font-size="10" fill="#52525B">C-band radar • All-weather</text>
    
    <rect x="370" y="170" width="330" height="100" rx="10" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="386" y="195" font-family="sans-serif" font-size="13" font-weight="bold" fill="#F97316">🗺️ Landsat + DEM</text>
    <text x="386" y="220" font-family="sans-serif" font-size="11" fill="#A1A1AA">Long-term trend +8% • Slope 2.1%</text>
    <text x="386" y="238" font-family="sans-serif" font-size="10" fill="#52525B">30m • NASA/USGS</text>
    
    <rect x="20" y="290" width="680" height="100" rx="10" fill="#18181B" stroke="#EF4444" stroke-width="1" opacity="0.5"/>
    <text x="36" y="315" font-family="sans-serif" font-size="13" font-weight="bold" fill="#EF4444">🐛 Pest Risk Score: 28/100</text>
    <text x="36" y="340" font-family="sans-serif" font-size="11" fill="#A1A1AA">Low to moderate risk. Monitor REIP-stressed cells.</text>
    <text x="36" y="358" font-family="sans-serif" font-size="10" fill="#52525B">Based on: REIP + humidity + temperature + NDVI</text>
    
    <!-- Pest and Drainage cards -->
    <rect x="20" y="410" width="330" height="50" rx="10" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="36" y="435" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FBBF24">28</text>
    <text x="60" y="435" font-family="sans-serif" font-size="11" fill="#52525B">/ 100 Pest Risk</text>
    
    <rect x="370" y="410" width="330" height="50" rx="10" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="386" y="435" font-family="sans-serif" font-size="14" font-weight="bold" fill="#60A5FA">72</text>
    <text x="410" y="435" font-family="sans-serif" font-size="11" fill="#52525B">/ 100 Drainage</text>
  </g>
  
  <!-- Mock screenshot 3: Settings -->
  <g transform="translate(40, 1040)">
    <rect x="0" y="0" width="720" height="480" rx="12" fill="#09090B"/>
    <text x="360" y="30" font-family="sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">⚙️ Settings</text>
    
    <!-- Profile -->
    <rect x="20" y="50" width="680" height="180" rx="12" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="36" y="80" font-family="sans-serif" font-size="14" font-weight="bold" fill="#4ADE80">👤 Profile</text>
    <rect x="36" y="96" width="300" height="36" rx="8" fill="#27272A"/>
    <text x="48" y="120" font-family="sans-serif" font-size="12" fill="#A1A1AA">Your Name</text>
    <rect x="36" y="140" width="300" height="36" rx="8" fill="#27272A"/>
    <text x="48" y="164" font-family="sans-serif" font-size="12" fill="#A1A1AA">Select Language</text>
    <rect x="380" y="96" width="300" height="80" rx="8" fill="#27272A"/>
    <text x="400" y="130" font-family="sans-serif" font-size="12" fill="#A1A1AA">Select your state for</text>
    <text x="400" y="150" font-family="sans-serif" font-size="12" fill="#A1A1AA">localized recommendations</text>
    
    <rect x="36" y="196" width="648" height="28" rx="8" fill="#2E7D32"/>
    <text x="360" y="215" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">Save Settings</text>
    
    <!-- Data Preferences -->
    <rect x="20" y="250" width="680" height="120" rx="12" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="36" y="280" font-family="sans-serif" font-size="14" font-weight="bold" fill="#60A5FA">📡 Data Preferences</text>
    <rect x="36" y="296" width="16" height="16" rx="4" fill="#2E7D32"/>
    <text x="60" y="310" font-family="sans-serif" font-size="12" fill="#D4D4D8">Auto-refresh satellite data every 7 days</text>
    <rect x="36" y="320" width="16" height="16" rx="4" fill="#2E7D32"/>
    <text x="60" y="334" font-family="sans-serif" font-size="12" fill="#D4D4D8">Notify when new satellite data is available</text>
    <rect x="36" y="344" width="16" height="16" rx="4" fill="#2E7D32"/>
    <text x="60" y="358" font-family="sans-serif" font-size="12" fill="#D4D4D8">Save analysis history locally</text>
    
    <!-- Account -->
    <rect x="20" y="390" width="680" height="70" rx="12" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <text x="36" y="420" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FBBF24">🔐 Account</text>
    <text x="36" y="445" font-family="sans-serif" font-size="11" fill="#52525B">App v4.0 • All data processed locally • Jai Kisan 🌾</text>
  </g>
  
  <!-- Watermark -->
  <text x="400" y="1560" font-family="sans-serif" font-size="11" fill="#52525B" text-anchor="middle">✨ Screenshot Placeholder • Krishi Drishti</text>
</svg>
