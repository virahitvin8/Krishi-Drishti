<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d2818"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="160" x2="1280" y2="160" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="white" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="white" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="white" stroke-width="0.5"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="white" stroke-width="0.5"/>
  </g>
  
  <!-- Satellite orbit -->
  <g transform="translate(180, 140)" opacity="0.15">
    <ellipse cx="0" cy="0" rx="120" ry="40" fill="none" stroke="#1976D2" stroke-width="2" stroke-dasharray="6 8"/>
    <circle cx="100" cy="-28" r="4" fill="#1976D2"/>
    <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="20s" repeatCount="indefinite"/>
  </g>
  
  <!-- Leaf icon -->
  <g transform="translate(180, 260)">
    <!-- Leaf body -->
    <path d="M0 80 C-20 40, -40 0, 0 -40 C40 0, 20 40, 0 80Z" fill="url(#leaf)" stroke="#22C55E" stroke-width="2" opacity="0.9"/>
    <!-- Leaf vein -->
    <line x1="0" y1="-35" x2="0" y2="75" stroke="#A5D6A7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Side veins -->
    <line x1="0" y1="-10" x2="-12" y2="10" stroke="#A5D6A7" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
    <line x1="0" y1="10" x2="10" y2="30" stroke="#A5D6A7" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
    <line x1="0" y1="30" x2="-8" y2="50" stroke="#A5D6A7" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
  </g>
  
  <!-- Satellite dish symbol -->
  <g transform="translate(180, 420)" opacity="0.12">
    <path d="M0 0 Q35 -40 70 0" fill="none" stroke="#1976D2" stroke-width="3"/>
    <circle cx="35" cy="-20" r="3" fill="#1976D2"/>
  </g>
  
  <!-- Main title -->
  <text x="360" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white">Krishi Drishti</text>
  <text x="360" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="url(#accent)" font-weight="600">Satellite Vision for Smart Farming</text>
  
  <!-- Subtitle -->
  <text x="360" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#71717A">Free satellite-based crop health monitoring for Indian farmers</text>
  
  <!-- Tagline -->
  <text x="360" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="36" fill="#A1A1AA" font-weight="300">कृषि दृष्टि</text>
  
  <!-- Feature capsules -->
  <g transform="translate(360, 400)">
    <rect x="0" y="0" rx="20" width="140" height="40" fill="none" stroke="#2E7D32" stroke-width="1.5"/>
    <text x="70" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4ADE80" text-anchor="middle">🛰️ Sentinel-2</text>
    
    <rect x="155" y="0" rx="20" width="140" height="40" fill="none" stroke="#1976D2" stroke-width="1.5"/>
    <text x="225" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#60A5FA" text-anchor="middle">🌿 NDVI + EVI</text>
    
    <rect x="310" y="0" rx="20" width="140" height="40" fill="none" stroke="#F9A825" stroke-width="1.5"/>
    <text x="380" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#FBBF24" text-anchor="middle">🌤️ Weather</text>
  </g>
  
  <!-- Bottom badges -->
  <g transform="translate(360, 480)">
    <rect x="0" y="0" rx="8" width="100" height="28" fill="#2E7D32"/>
    <text x="50" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">Flutter</text>
    
    <rect x="110" y="0" rx="8" width="90" height="28" fill="#05998B"/>
    <text x="155" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">FastAPI</text>
    
    <rect x="210" y="0" rx="8" width="100" height="28" fill="#3ECF8E"/>
    <text x="260" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">Supabase</text>
    
    <rect x="320" y="0" rx="8" width="90" height="28" fill="#00C7B7"/>
    <text x="365" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">Netlify</text>
  </g>
  
  <!-- Right side: Field map visualization -->
  <g transform="translate(850, 150)">
    <!-- Mini map representation -->
    <rect x="0" y="0" rx="16" width="340" height="340" fill="#18181B" stroke="#27272A" stroke-width="2"/>
    <!-- Grid cells -->
    <rect x="20" y="20" rx="4" width="60" height="60" fill="#2ECC71" opacity="0.6"/>
    <rect x="85" y="20" rx="4" width="60" height="60" fill="#4ADE80" opacity="0.5"/>
    <rect x="150" y="20" rx="4" width="60" height="60" fill="#E74C3C" opacity="0.4"/>
    <rect x="215" y="20" rx="4" width="60" height="60" fill="#2ECC71" opacity="0.6"/>
    <rect x="280" y="20" rx="4" width="40" height="60" fill="#60A5FA" opacity="0.5"/>
    
    <rect x="20" y="85" rx="4" width="60" height="60" fill="#60A5FA" opacity="0.5"/>
    <rect x="85" y="85" rx="4" width="60" height="60" fill="#2ECC71" opacity="0.7"/>
    <rect x="150" y="85" rx="4" width="60" height="60" fill="#E74C3C" opacity="0.3"/>
    <rect x="215" y="85" rx="4" width="60" height="60" fill="#F9A825" opacity="0.5"/>
    <rect x="280" y="85" rx="4" width="40" height="60" fill="#2ECC71" opacity="0.6"/>
    
    <rect x="20" y="150" rx="4" width="60" height="60" fill="#E74C3C" opacity="0.4"/>
    <rect x="85" y="150" rx="4" width="60" height="60" fill="#2ECC71" opacity="0.6"/>
    <rect x="150" y="150" rx="4" width="60" height="60" fill="#4ADE80" opacity="0.7"/>
    <rect x="215" y="150" rx="4" width="60" height="60" fill="#2ECC71" opacity="0.5"/>
    <rect x="280" y="150" rx="4" width="40" height="60" fill="#60A5FA" opacity="0.4"/>
    
    <rect x="20" y="215" rx="4" width="60" height="60" fill="#4ADE80" opacity="0.5"/>
    <rect x="85" y="215" rx="4" width="60" height="60" fill="#E74C3C" opacity="0.3"/>
    <rect x="150" y="215" rx="4" width="60" height="60" fill="#2ECC71" opacity="0.6"/>
    <rect x="215" y="215" rx="4" width="60" height="60" fill="#4ADE80" opacity="0.5"/>
    <rect x="280" y="215" rx="4" width="40" height="60" fill="#F9A825" opacity="0.4"/>
    
    <rect x="20" y="280" rx="4" width="60" height="40" fill="#60A5FA" opacity="0.4"/>
    <rect x="85" y="280" rx="4" width="60" height="40" fill="#2ECC71" opacity="0.5"/>
    <rect x="150" y="280" rx="4" width="60" height="40" fill="#4ADE80" opacity="0.6"/>
    <rect x="215" y="280" rx="4" width="60" height="40" fill="#2ECC71" opacity="0.7"/>
    <rect x="280" y="280" rx="4" width="40" height="40" fill="#4ADE80" opacity="0.5"/>
    
    <!-- Legend -->
    <rect x="20" y="325" rx="2" width="8" height="8" fill="#E74C3C"/>
    <text x="32" y="334" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#71717A">Stressed</text>
    <rect x="80" y="325" rx="2" width="8" height="8" fill="#2ECC71"/>
    <text x="92" y="334" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#71717A">Healthy</text>
    <rect x="140" y="325" rx="2" width="8" height="8" fill="#60A5FA"/>
    <text x="152" y="334" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#71717A">Monitor</text>
    
    <!-- Score -->
    <text x="170" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#4ADE80" text-anchor="middle">78</text>
    <text x="170" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#71717A" text-anchor="middle">Health Score</text>
  </g>
  
  <!-- Bottom bar -->
  <rect x="0" y="580" width="1280" height="60" fill="#0D2818" opacity="0.5"/>
  <text x="640" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#4ADE80" text-anchor="middle" font-weight="500">Made with ❤️ for Indian Farmers • जय किसान 🌾 • Free & Open Source</text>
</svg>
