# ============================================================
# Krishi Drishti — Build & Release APK (GitHub Actions)
# ============================================================
# HOW RELEASES WORK:
#   1. Push code → auto-builds debug APK
#   2. Push tag v* (e.g., v1.1.0) → builds + creates Release with APK
#   3. Manual: Go to Actions → Run workflow → choose build type
#
# APK download link after release:
#   https://github.com/virahitvin8/Krishi-Drishti/releases/latest
#
# NOTE: APK is 152MB. GitHub Releases support up to 2GB.
# The 100MB limit only applies to git commits, not releases.
# ============================================================

name: Build & Release APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  FLUTTER_VERSION: '3.44.1'
  NDK_VERSION: '28.2.13676358'
  APK_NAME: 'Krishi-Drishti'  # Base name for the APK file

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: KrishiDrishti_Final_v4/flutter_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyze
        run: flutter analyze

  build:
    name: Build APK
    needs: analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: KrishiDrishti_Final_v4/flutter_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Ensure cmdline-tools and install NDK
        run: |
          yes | $ANDROID_SDK_ROOT/tools/bin/sdkmanager --install "ndk;${{ env.NDK_VERSION }}" 2>/dev/null || \
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ env.NDK_VERSION }}" 2>/dev/null || \
          echo "::warning::Could not install NDK via sdkmanager, Gradle will handle it"

      - name: Determine build type
        id: build_type
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "build_type=release" >> $GITHUB_OUTPUT
          else
            echo "build_type=${{ github.event.inputs.build_type || 'debug' }}" >> $GITHUB_OUTPUT
          fi

      - name: Build APK
        run: flutter build apk --${{ steps.build_type.outputs.build_type }}

      - name: Rename APK to Krishi Drishti
        run: |
          mkdir -p ../../apk-artifacts
          # Rename: app-debug.apk → Krishi-Drishti-v1.1.0-debug.apk
          BUILD_TYPE="${{ steps.build_type.outputs.build_type }}"
          VERSION="${GITHUB_REF_NAME#v}"  # Remove 'v' prefix from tag
          [[ -z "$VERSION" ]] && VERSION="latest"
          APK_FINAL_NAME="${APK_NAME}-${VERSION}-${BUILD_TYPE}.apk"
          cp build/app/outputs/flutter-apk/app-${BUILD_TYPE}.apk \
             ../../apk-artifacts/${APK_FINAL_NAME}
          echo "APK_NAME_FINAL=${APK_FINAL_NAME}" >> $GITHUB_ENV
          echo "✅ APK ready: ${APK_FINAL_NAME}"
          ls -lh ../../apk-artifacts/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: krishi-drishti-apk
          path: apk-artifacts/*.apk
          retention-days: 60

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: krishi-drishti-apk
          path: ./apk

      - name: List APK files
        run: ls -lh apk/

      - name: Generate detailed release notes
        run: |
          cat > release_notes.md << 'RELEASENOTES'
          # 🚀 Krishi Drishti APK Release

          **Satellite Vision for Smart Farming** 🌾🛰️

          ## 📲 Download & Install
          Download the APK file below and install on your Android device:
          1. Enable "Install from unknown sources" in Settings
          2. Open the downloaded APK file
          3. Tap "Install" → "Open"

          ## 🌐 Also Available as Web App
          https://krishidrishti.netlify.app

          ## ✨ About
          Krishi Drishti brings the power of satellites directly to Indian farmers.
          Using free Sentinel-2 data, our app analyzes your farm and gives you
          clear insights about crop health — without any technical knowledge required.

          ## 🛰️ Features
          - Multi-satellite analysis (Sentinel-2, Sentinel-1, Landsat, ISRO)
          - Crop health indices: NDVI, EVI, NDWI, REIP, SAVI, GNDVI
          - Interactive hotspot grid map
          - Weather integration & irrigation advice
          - Pest risk scoring
          - Save & track farms over time

          ---
          **Made with ❤️ for Indian Farmers • जय किसान 🌾**
          RELEASENOTES

          # Append build info
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "**Build:** \`${{ github.sha }}\`" >> release_notes.md
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> release_notes.md

      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          name: Krishi Drishti ${{ github.ref_name }}
          body_path: release_notes.md
          files: apk/*.apk
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
