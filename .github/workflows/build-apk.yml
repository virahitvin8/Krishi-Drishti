name: Build & Release APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: KrishiDrishti_Final_v4/flutter_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Verify Flutter analyze
        run: flutter analyze

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: flutter build apk --${{ github.event.inputs.build_type || 'debug' }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: krishi-drishti-${{ github.event.inputs.build_type || 'debug' }}-apk
          path: KrishiDrishti_Final_v4/flutter_app/build/app/outputs/flutter-apk/*.apk
          retention-days: 30

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: krishi-drishti-release-apk
          path: ./apk

      - name: Generate release notes
        id: release_notes
        run: |
          echo "## KrishiDrishti APK Release" > release_notes.md
          echo "" >> release_notes.md
          echo "### Changes in this release" >> release_notes.md
          echo "- Automated build from commit \`${{ github.sha }}\`" >> release_notes.md
          echo "- Build date: $(date -u '+%Y-%m-%d %H:%M UTC')" >> release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: KrishiDrishti ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            apk/app-debug.apk
            apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
