name: Build & Release APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  FLUTTER_VERSION: '3.44.1'
  NDK_VERSION: '28.2.13676358'

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: KrishiDrishti_Final_v4/flutter_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyze
        run: flutter analyze

  build:
    name: Build APK
    needs: analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: KrishiDrishti_Final_v4/flutter_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;${{ env.NDK_VERSION }}" || \
          echo "NDK may already be installed, continuing..."

      - name: Determine build type
        id: build_type
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "build_type=release" >> $GITHUB_OUTPUT
          else
            echo "build_type=${{ github.event.inputs.build_type || 'debug' }}" >> $GITHUB_OUTPUT
          fi

      - name: Build APK
        run: flutter build apk --${{ steps.build_type.outputs.build_type }}

      - name: Rename APK for artifact
        run: |
          mkdir -p ../../apk-artifacts
          cp build/app/outputs/flutter-apk/app-${{ steps.build_type.outputs.build_type }}.apk \
             ../../apk-artifacts/krishi-drishti-${{ steps.build_type.outputs.build_type }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: krishi-drishti-apk
          path: apk-artifacts/*.apk
          retention-days: 60

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: krishi-drishti-apk
          path: ./apk

      - name: Generate release notes
        run: |
          cat > release_notes.md << 'EOF'
          ## KrishiDrishti APK Release

          ### Changes in this release
          - Automated CI build from commit ${{ github.sha }}
          - Build date: $(date -u '+%Y-%m-%d %H:%M UTC')
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: KrishiDrishti ${{ github.ref_name }}
          body_path: release_notes.md
          files: apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
