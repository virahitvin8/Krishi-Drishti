name: krishi_drishti
description: Krishi Drishti - Satellite Vision for Smart Farming. Native mobile app with GPS crop field analysis.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Map & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Networking
  http: ^1.2.2
  http_parser: ^4.0.0

  # Storage & State
  shared_preferences: ^2.3.3
  provider: ^6.1.2

  # File handling
  file_picker: ^8.1.6

  # UI
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Utilities
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
