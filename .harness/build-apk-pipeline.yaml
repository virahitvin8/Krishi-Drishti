# ============================================================
# Krishi Drishti — Harness CI Pipeline (Free Tier)
# ============================================================
# ✅ Uses Docker image with Flutter + Android SDK pre-installed
#
# ⚠️ IMPORTANT SETUP BEFORE USE:
#   1. Create a Docker Connector in Harness:
#      - Go to Project Settings → Connectors → New Connector → Docker Registry
#      - For ghcr.io: Provider Type = "Other", URL = "https://ghcr.io"
#        Use GitHub username + PAT (read:packages scope) for auth
#      - For Docker Hub: Provider Type = "Docker Hub"
#      - Give it an identifier (e.g., "ghcr_connector" or "dockerhub")
#   2. Update `connectorRef` below to match your connector's identifier
#   3. Update `account.harnessCloud` if your cloud connector has a different ID
#
# 📦 Docker Image: ghcr.io/cirruslabs/flutter
#   - Flutter + Android SDK pre-installed
#   - ⚠️ Deprecated after May 1, 2026 — consider migrating to your own image
# ============================================================

pipeline:
  name: KrishiDrishti APK Build
  identifier: krishi_drishti_apk_build
  projectIdentifier: KrishiDrishti
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: account.GitHubConnector
        repoName: virahitvin8/Krishi-Drishti
        build:
          type: branch
          spec:
            branch: main
  stages:
    - stage:
        name: Build APK
        identifier: build_apk
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: Cloud
            spec:
              # ⚠️ Update this to your Harness Cloud connector ID
              connectorRef: account.harnessCloud
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec:
                  resources:
                    memory: 8Gi
                    cpu: 4
          execution:
            steps:
              - step:
                  type: Run
                  name: Build Flutter APK
                  identifier: build_flutter_apk
                  timeout: 30m
                  spec:
                    # ⚠️ IMPORTANT: Replace this with YOUR Docker connector ID
                    # Example: account.DockerHub, account.ghcr_connector, etc.
                    connectorRef: account.harnessImage
                    image: ghcr.io/cirruslabs/flutter:3.44.1
                    shell: Sh
                    command: |-
                      set -e  # Exit on any error

                      echo "========================================"
                      echo "  Krishi Drishti — Flutter APK Build"
                      echo "========================================"

                      echo ""
                      echo "=== Flutter version ==="
                      flutter --version

                      echo ""
                      echo "=== Checking Android SDK ==="
                      echo "ANDROID_HOME: ${ANDROID_HOME:-/usr/local/lib/android/sdk}"
                      ls -la ${ANDROID_HOME:-/usr/local/lib/android/sdk}/platforms/ 2>/dev/null || echo "No Android platforms dir"
                      ls -la ${ANDROID_HOME:-/usr/local/lib/android/sdk}/build-tools/ 2>/dev/null || echo "No build-tools dir"

                      echo ""
                      echo "=== Accept Android licenses ==="
                      yes | flutter doctor --android-licenses 2>/dev/null || true

                      echo ""
                      echo "=== Flutter doctor ==="
                      flutter doctor 2>&1 || true

                      echo ""
                      echo "=== Get dependencies ==="
                      cd KrishiDrishti_Final_v4/flutter_app
                      flutter pub get

                      echo ""
                      echo "=== Run static analysis ==="
                      flutter analyze

                      echo ""
                      echo "=== Build debug APK ==="
                      flutter build apk --debug

                      echo ""
                      echo "=== Verify APK ==="
                      APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
                      if [ -f "$APK_PATH" ]; then
                        echo "✅ APK built successfully!"
                        ls -lh "$APK_PATH"
                      else
                        echo "❌ APK not found at $APK_PATH"
                        exit 1
                      fi

                      echo ""
                      echo "=== Copy APK to artifacts ==="
                      cp "$APK_PATH" ../../krishi-drishti-debug.apk
                      ls -lh ../../krishi-drishti-debug.apk

                      echo ""
                      echo "=== Build complete ==="

              - step:
                  type: Artifact
                  name: Upload APK
                  identifier: upload_apk
                  spec:
                    storeType: Harness
                    paths:
                      - krishi-drishti-debug.apk

        variables:
          - name: ANDROID_HOME
            type: String
            value: /usr/local/lib/android/sdk
          - name: ANDROID_SDK_ROOT
            type: String
            value: /usr/local/lib/android/sdk
          - name: GRADLE_OPTS
            type: String
            value: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g
