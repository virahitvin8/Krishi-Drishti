pipeline:
  name: KrishiDrishti APK Build
  identifier: krishi_drishti_apk_build
  projectIdentifier: KrishiDrishti
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: account.GitHubConnector
        repoName: virahitvin8/Krishi-Drishti
        build:
          type: branch
          spec:
            branch: main
  stages:
    - stage:
        name: Build APK
        identifier: build_apk
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: Cloud
            spec:
              connectorRef: account.harnessCloud
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec:
                  resources:
                    memory: 8Gi
                    cpu: 4
          execution:
            steps:
              - step:
                  type: Run
                  name: Build Flutter APK
                  identifier: build_flutter_apk
                  spec:
                    connectorRef: account.harnessImage
                    image: ghcr.io/cirruslabs/flutter:3.44.1
                    shell: Sh
                    command: |-
                      echo "=== Flutter version ==="
                      flutter --version

                      echo "=== Get dependencies ==="
                      cd KrishiDrishti_Final_v4/flutter_app
                      flutter pub get

                      echo "=== Run analyze ==="
                      flutter analyze

                      echo "=== Build APK ==="
                      flutter build apk --debug

                      echo "=== Copy APK artifact ==="
                      cp build/app/outputs/flutter-apk/app-debug.apk \
                         ../../krishi-drishti-debug.apk
                      ls -lh ../../krishi-drishti-debug.apk

              - step:
                  type: Artifact
                  name: Upload APK
                  identifier: upload_apk
                  spec:
                    storeType: Harness
                    paths:
                      - krishi-drishti-debug.apk

        variables:
          - name: ANDROID_HOME
            type: String
            value: /usr/local/lib/android/sdk
          - name: ANDROID_SDK_ROOT
            type: String
            value: /usr/local/lib/android/sdk
          - name: GRADLE_OPTS
            type: String
            value: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx4g"
